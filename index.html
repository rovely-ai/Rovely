<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rovely AI | AI-Powered Trip Planning</title>
  <link rel="canonical" href="https://rovelyai.com/" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="./Assets/favicon.ico" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
    body { overflow-x: hidden; }

    /* NAVBAR */
    nav {
      width: 100%;
      background: #fff;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #eaeaea;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo a {
      font-size: 26px;
      font-weight: 700;
      color: #E27606;
      text-decoration: none;
    }

    .nav-center { flex: 1; display: flex; justify-content: center; }
    .menu { display: flex; gap: 40px; transition: right 0.3s ease; }
    .menu a { text-decoration: none; color: black; position: relative; }
    .menu a::after {
      content: ""; position: absolute; left: 0; bottom: 0; height: 2px;
      background-color: #177D83; width: 0%; transition: width 0.3s ease;
    }
    .menu a:hover::after { width: 100%; animation: heartbeat 1.5s ease-in-out 0.3s infinite; }
    @keyframes heartbeat { 0%,100% { width:100%; } 50% { width:60%; } }

    .app-btn { padding: 10px 18px; background: #E27606; color: #fff; border-radius: 8px; font-weight:600; text-decoration:none; transition: opacity 0.2s ease;       font-size: 15px;}
    .app-btn:hover { opacity:0.8; }

    /* HERO */
    /* .hero { position: relative; width: 100%; height: 85vh; background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('./Assets/hero.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 6vw; color: white; }
    .hero-content { max-width: 600px; }
    .hero h1 { font-size: 68px; font-weight:700; line-height:1.05; margin-bottom:20px; }
    .hero p { font-size:20px; opacity:0.9; margin-bottom:35px; }
    .cta-btn { display:inline-block; padding:15px 32px; border-radius:30px; background:#fff; color:#177D83; font-size:18px; font-weight:600; text-decoration:none; transition: opacity 0.2s ease; }
    .cta-btn:hover { opacity:0.8; } */

  .hero {
    /* background: radial-gradient(
    circle at 75% 45%,
    #ffffff 0%,
    #f4f4f4 55%,
    #eeeeee 100%
  ); */
  background: radial-gradient(
  circle at center,
  #103b52 0%,
  #061b3a 55%,
  #04142d 100%
);


  min-height: 90vh; /* key fix */
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
}

.hero-wrapper {
  max-width: 1300px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 250px; /* bigger gap */
}

/* LEFT */
.hero-left {
  flex: 1;
  padding-top: 20px;

}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;

  padding: 8px 14px;
  border-radius: 999px;

  background: rgba(44, 140, 140, 0.12);
  border: 1px solid rgba(44, 140, 140, 0.18);

  color: #4fd1c5;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2.4px;
  text-transform: uppercase;

  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  width: fit-content;
  margin-bottom: 28px;
}

.hero h1 {
font-size: 60px;
  /* line-height: 0.95;
  letter-spacing: -3px; */

  font-weight: 800;
  color: #ffffff;

  margin-bottom: 28px;
  max-width: 700px;
}

.subtext {
  font-size: clamp(17px, 2vw, 20px);
  line-height: 1.75;

  color: rgba(255, 255, 255, 0.72);

  max-width: 560px;
  margin-bottom: 40px;

  font-weight: 400;
  letter-spacing: -0.2px;
}

/* CTA */
.cta-group {
  display: flex;
  gap: 20px;
  align-items: center;
}

.primary-btn {
  background: #e27606;
  color: white;
  padding: 16px 60px;
  border-radius: 30px;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 10px 25px rgba(226, 118, 6, 0.35);
  transition: all 0.25s ease;


}
.primary-btn:hover {
  transform: translateY(-3px); /* lift */
  box-shadow: 0 14px 30px rgba(226, 118, 6, 0.35);
  background: #ff8a1a;
}


.secondary-btn {
  border: 2px solid #e27606;
  color: #e27606;
  padding: 14px 28px;
  border-radius: 30px;
  font-weight: 600;
  text-decoration: none;
}

/* RIGHT */
.hero-right {
  flex: 1;
  position: relative;
  display: flex;
  justify-content: center;
}

.phone {
  width: 330px;            /* bigger */
  transform: rotate(-15deg); /* stronger tilt */
  z-index: 3;
}

.mobile{
  display: none;
}

/* decorative elements */
.path {
  position: absolute;
  width: 1000px;   /* MUCH bigger */
  left: -350px;   /* was too far left */
  bottom: -110px;  /* bring slightly up */
  transform: rotate(5deg);
  z-index: 1;
  opacity: 0.9;
}

.plane {
  position: absolute;
  width: 60px;
  top: 40px;
  right: 20px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .hero-wrapper {
    flex-direction: column;
    text-align: center;
    gap:40px;
  }

  .hero h1 {
    font-size: 48px;
  }
  .hero-left {
  flex: 1;
  padding-top: 100px;

}

  .subtext {

    max-width: 320px;   /* controls width */
    font-size: 16px;    /* slightly smaller text */
    line-height: 1.5;   /* tighter spacing */
    margin: 0 auto 25px;
  }

  .cta-group {
    justify-content: center;
  }

  .hero-right {
    margin-top: 0px;
  }

  .phone {
    display: none
  }
  .mobile{
    display: flex;
    width: 250px;
    z-index: 2;
  }
  .path{
    width: 550px;
    left: -200px;
    bottom:0;
  }
}

    /* HAMBURGER */
    .hamburger { display:none; flex-direction: column; justify-content: space-between; width:25px; height:20px; cursor:pointer; z-index:1100; }
    .hamburger span { display:block; height:3px; background:#000; border-radius:2px; transition: all 0.3s ease; }

    /* MOBILE */
    @media(max-width:850px){
      .hamburger { display:flex; }
      .app-btn.desktop { display:none; }

      .menu {
        flex-direction: column;
        position: fixed;
        top: 0;
        right: -100%;
        width: 250px;
        height: 100vh;
        background: rgba(255,255,255,0.95);
        padding: 80px 20px 20px 20px;
        gap: 20px;
        box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        z-index: 1001;
      }

      .menu.active { right: 0; }

      .menu a.app-btn.mobile { width:100%; text-align:center; }

      .hero { text-align:center; justify-content:center; padding:0 5vw; }
      .hero h1 { font-size:44px; }
      .cta-btn { margin:0 auto; }
    }

    /* Hamburger X animation */
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.active span:nth-child(2) { opacity:0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    /* OVERLAY */
    #overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.4);
      opacity:0; visibility:hidden; transition: opacity 0.3s ease;
      z-index:900;
    }
    #overlay.active { opacity:1; visibility:visible; }
  </style>
</head>
<body>

  <nav>
    <div class="logo"><a href="./index.html">Rovely AI</a></div>

    <div class="nav-center">
      <div class="menu" id="menu">
        <a href="./aboutUs.html">About us</a>
        <a href="./privacy-policy.html">Privacy Policy</a>
        <a href="./terms-of-service.html">Terms of Service</a>
        <a href="./support.html">Help Center</a>
      </div>
    </div>

    <a class="app-btn desktop" href="https://apps.apple.com/us/app/rovely-ai/id6762536395" target="_blank">Download on App Store</a>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- Overlay -->
  <div id="overlay"></div>

  <!-- <section class="hero">
    <div class="hero-content">
      <h1>Rove Further. Plan Better</h1>
      <p>Redefining travel planning with AI — faster, smarter, and fully in your control.</p>
      <a href="https://apps.apple.com/us/app/rovely-ai/id6762536395" target="_blank" class="cta-btn">Download App</a>
    </div>
  </section> -->

  <section class="hero">
    <div class="hero-wrapper">
  
      <!-- LEFT CONTENT -->
      <div class="hero-left">
        <p class="eyebrow">THE FUTURE OF EXPLORATION</p>

        <h1>
          Rove further.<br />
          Plan better.
        </h1>

        <p class="subtext">
          Our AI-driven engine crafts hyper-personalized itineraries in seconds,
          so you can spend less time scrolling and more time exploring.
        </p>

        <div class="cta-group">
          <a href="https://apps.apple.com/us/app/rovely-ai/id6762536395" target="_blank" class="primary-btn">Download App</a>
          <!-- <a href="#" class="secondary-btn">View Demo</a> -->
        </div>
      </div>

      <!-- RIGHT VISUAL -->
      <div class="hero-right">
        <img src="./Assets/phone.png" class="phone" />
        <img src="./Assets/mobile.png" class="mobile" />

        <!-- decorative path -->
        <img src="./Assets/flightPath.png" class="path" />
      </div>

    </div>
  </section>

  <script>
    const hamburger = document.getElementById('hamburger');
    const menu = document.getElementById('menu');
    const overlay = document.getElementById('overlay');

    hamburger.addEventListener('click', () => {
      menu.classList.toggle('active');
      hamburger.classList.toggle('active');
      overlay.classList.toggle('active');
    });

    // Close menu if overlay is clicked
    overlay.addEventListener('click', () => {
      menu.classList.remove('active');
      hamburger.classList.remove('active');
      overlay.classList.remove('active');
    });
  </script>

</body>
</html>
